<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="panel-admin" class="dash-panel">
        <div class="nav-bar">
            <span class="nav-logo">ClinicBook — Admin</span>
            <div class="nav-links">
                <span> <a href="#doc-card" style="text-decoration: none; font-size: 13px; color: var(--text-secondary)">Doctors</a> </span>
                <span> <a href="#appt-card" style="text-decoration: none; font-size: 13px; color: var(--text-secondary)">Appointments</a> </span>
            </div>
            <span class="badge badge-red">Admin</span>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-val doctor-count"></div>
                <div class="stat-lbl">Registered doctors</div>
            </div>
            <div class="stat-card">
                <div class="stat-val appointment-count"></div>
                <div class="stat-lbl">Appointments</div>
            </div>
            <div class="stat-card">
                <div class="stat-val patient-count"></div>
                <div class="stat-lbl">Patients</div>
            </div>
            
        </div>

        <!-- <div class="two-col"> -->
        <div>
            <div class="card" id="doc-card">
                <div class="row-flex" style="justify-content:space-between;margin-bottom:10px">
                    <p class="section-label" style="margin:0">Doctors</p>
                    <button class="btn-primary">
                        
                        <a href="registerDoctor.html" style="text-decoration: none;">+ Add doctor</a>
                    </button>
                </div>

                <div class="doctor-list">
                </div>
            </div>

        </div>

        <div class="card" id="appt-card">
            <p class="section-label">All appointments</p>
            <div class="appointment-cards">

            </div>
        </div>
    </div>

    <script src="js/app.js" type="module"></script>
</body>

</html>
