<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Doctor</title>
    <link rel="stylesheet" href="css/login.css">
    <!-- <link rel="stylesheet" href="css/style.css"> -->
</head>

<body>
    <div class="registration-container">
        <div class="form-card">
            <div class="form-header">
                <h1>Clinicbook</h1>
                <p>Create New Doctor Account</p>
            </div>

            <form id="registrationForm" method="POST" action="">
                <p id="message"></p>

                <div class="name-row">
                    <div class="form-group">
                        <label for="first_name">First Name *</label>
                        <input type="text" id="first_name" name="first_name" class="input-mock" required>
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name *</label>
                        <input type="text" id="last_name" name="last_name" class="input-mock" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" class="input-mock" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="input-mock" placeholder="e.g., 0712 345 678">
                </div>

                <div class="form-group">
                    <label for="role">Role *</label>
                    <input type="text" id="role" name="role" class="input-mock" value="doctor" required readonly>
                </div>

                <div class="form-group">
                    <label for="image">Photo *</label>
                    <input type="file" id="image" name="image" class="input-mock" required>
                </div>

                <div class="form-group">
                    <label for="role">Specialization *</label>
                    <input type="text" id="specialization" name="specialization" class="input-mock" required>
                </div>

                <div class="form-group">
                    <label for="bio">Bio *</label>
                    <textarea type="text" id="bio" name="bio" class="input-mock" required></textarea>
                </div>

                <div class="form-group">
                    <label for="start_time">*Start Time *</label>
                    <input type="text" id="start_time" name="start_time" class="input-mock" required>
                </div>

                <div class="form-group">
                    <label for="end_time">End Time *</label>
                    <input type="text" id="end_time" name="end_time" class="input-mock" required>
                </div>

                <div class="form-group">
                    <label for="day_of_week">day_of_week *</label>
                    <input type="number" id="day_of_week" name="day_of_week" class="input-mock" required>
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" class="input-mock" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password *</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="input-mock" required>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>

            </form>
        </div>
    </div>

    <script src="js/registerDoctor.js"></script>
</body>

</html>
