        <div class="card spec-card">
            <h2 class="section-label">Find a doctor</h2>

            <div class="spec-filters">
                <button class="spec-pill" data-type="general">
                    <img src="assets/medical.png" class="spec-img" alt="General doctor">
                    <span>General</span>
                </button>

                <button class="spec-pill" data-type="pediatrics">
                    <img src="assets/pediatric.png" class="spec-img" alt="Pediatrics">
                    <span>Pediatrics</span>
                </button>

                <button class="spec-pill" data-type="urgent">
                    <img src="assets/bed.png" class="spec-img" alt="Urgent Care">
                    <span>Urgent Care</span>
                </button>

                <button class="spec-pill" data-type="specialist">
                    <img src="assets/expert.png" class="spec-img" alt="Specialist">
                    <span>Specialist</span>
                </button>
            </div>

            <br> <hr> <br>

            <div class="doctor-list">
                <!-- Doctor Card -->
                <div class="doctor-card">
                    <img src="assets/doc1.jpg" class="doctor-img" alt="Doctor">

                    <div class="doctor-info">
                        <h3 class="doctor-name">Dr. Sarah Kim</h3>
                        <p class="doctor-spec">General Practitioner</p>

                        <div class="doctor-meta">
                            <span class="doctor-rating">⭐ 4.8</span>
                            <span class="doctor-status available">Available</span>
                        </div>

                        <button class="btn-book">Book</button>
                    </div>
                </div>

                <!-- Repeat -->
                <div class="doctor-card">
                    <img src="assets/doc2.jpg" class="doctor-img" alt="Doctor">

                    <div class="doctor-info">
                        <h3 class="doctor-name">Dr. John Doe</h3>
                        <p class="doctor-spec">Pediatrics</p>

                        <div class="doctor-meta">
                            <span class="doctor-rating">⭐ 4.5</span>
                            <span class="doctor-status busy">Busy</span>
                        </div>

                        <button class="btn-book">Book</button>
                    </div>
                </div>
