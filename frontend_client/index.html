<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="./css/style.css">
    <!-- <link rel="stylesheet" href="./css/doctor.css"> -->
</head>

<body>
    <div class="nav-bar">
        <span class="nav-logo"> <a href="index.html">ClinicBook</a></span>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="appointments.html">My appointments</a>
            <a href="profile.html">Profile</a>
        </div>
        <div>

        </div>
        <div class="row-flex" style="gap:8px;">
            <div class="av av-blue" style="width:32px;height:32px;font-size:12px;"></div>
            <span style="font-size:13px;font-weight:500;color:var(--text-primary);">User</span>
        </div>
    </div>

    <main>
        <div class="hero-banner">
            <div class="hero-content">
                <div class="hero-date"></div>
                <h1 class="hero-greeting">
                    Good morning, <span class="username"></span>
                </h1>
                <p class="hero-sub">
                    Ready to take care of your health today? Book an appointment in seconds.
                </p>
                <div class="hero-actions">
                    <button class="btn-primary">Book Appointment</button>
                    <button class="btn-secondary"
                        onclick="window.location.href='appointments.html?tab=upcoming'">ViewSchedule</button>
                </div>
            </div>

            <!-- Decorative element -->
            <div class="hero-blob"></div>
        </div>

        <!-- Upcoming appointment alert -->
        <div class="next-appt-card">
        </div>

        <h2 class="section-label" style="margin-bottom:10px;">What do you need?</h2>
        <div class="quick-actions">
            <button class="quick-btn">
                <a href="#find-doctor"
                    style="display: flex; flex-direction: column; align-items: center; text-decoration: none; color: inherit; width: 100%; height: 100%; padding: 14px 8px 12px;">
                    <div class="quick-icon" style="background:#E1F5EE;">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <circle cx="10" cy="8" r="4" stroke="#0F6E56" stroke-width="1.5" />
                            <path d="M3 17c0-3 3-5 7-5s7 2 7 5" stroke="#0F6E56" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg>
                    </div>
                    <span>Find a doctor</span>
                </a>

            </button>
            <button class="quick-btn" onclick="window.location.href='appointments.html?tab=history'">
                <a
                    style="display: flex; flex-direction: column; align-items: center; text-decoration: none; color: inherit; width: 100%; height: 100%; padding: 14px 8px 12px;">
                    <div class="quick-icon" style="background:#FAEEDA;">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 3v14M3 10h14" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" />
                            <rect x="3" y="3" width="14" height="14" rx="3" stroke="#854F0B" stroke-width="1.5" />
                        </svg>
                    </div>
                    <span> My history</span>
                </a>

            </button>
        </div>

        <div class="card spec-card" id="find-doctor">
            <h2 class="section-label">Find a doctor</h2>

            <div class="spec-filters">
                <button class="spec-pill" data-type="All Doctors">
                    <img src="assets/all.png" class="spec-img" alt="General doctor">
                    <span>All Doctors</span>
                </button>
                <button class="spec-pill" data-type="General Physician">
                    <img src="assets/medical.png" class="spec-img" alt="General doctor">
                    <span>General Physician</span>
                </button>

                <button class="spec-pill" data-type="Pediatrics">
                    <img src="assets/pediatric.png" class="spec-img" alt="Pediatrics">
                    <span>Pediatrics</span>
                </button>

                <button class="spec-pill" data-type="Urgent Care">
                    <img src="assets/bed.png" class="spec-img" alt="Urgent Care">
                    <span>Urgent Care</span>
                </button>

                <button class="spec-pill" data-type="Specialist">
                    <img src="assets/expert.png" class="spec-img" alt="Specialist">
                    <span>Specialist</span>
                </button>

                <button class="spec-pill" data-type="Dermatology">
                    <img src="assets/dermatology.png" class="spec-img" alt="Specialist">
                    <span>Dermatology</span>
                </button>

                <button class="spec-pill" data-type="Nutrition & Mental Health">
                    <img src="assets/nutrition.png" class="spec-img" alt="Specialist">
                    <span>Nutrition & Mental Health</span>
                </button>
            </div>

            <br>
            <hr> <br>

            <div class="doctor-list">
                <!-- loader -->
                <div id="loadingScreen" class="loading-container">
                    <div class="loading-spinner"></div>
                    <p class="loading-text">Loading doctors. Please wait...</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="trust-strip">
            <div class="trust-item">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M8 1l1.5 4.5H14l-3.5 2.5 1.5 4.5L8 10l-4 2.5 1.5-4.5L2 5.5h4.5z" fill="#FFC000" />
                </svg>
                <span>Verified doctors</span>
            </div>
            <div class="trust-item">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <rect x="2" y="6" width="12" height="8" rx="2" stroke="#185fa5" stroke-width="1.2" />
                    <path d="M5 6V4a3 3 0 016 0v2" stroke="#185fa5" stroke-width="1.2" stroke-linecap="round" />
                </svg>
                <span>Your data is secure</span>
            </div>
            <div class="trust-item">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="6" stroke="#854F0B" stroke-width="1.2" />
                    <path d="M8 5v3l2 2" stroke="#854F0B" stroke-width="1.2" stroke-linecap="round" />
                </svg>
                <span>Confirmed in minutes</span>
            </div>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>

</html>
