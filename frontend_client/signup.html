<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="registration-container">
        <div class="form-card">
            <div class="form-header">
                <h1>Clinicbook</h1>
                <p>Create your account to book appointments</p>
            </div>

            <form id="registrationForm" method="POST" action="">
                <p id="message"></p>

                <div class="name-row">
                    <div class="form-group">
                        <label for="first_name">First Name *</label>
                        <input type="text" id="first_name" name="first_name" class="input-mock" required>
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name *</label>
                        <input type="text" id="last_name" name="last_name" class="input-mock" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" class="input-mock" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="input-mock" placeholder="e.g., 0712 345 678">
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" class="input-mock" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password *</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="input-mock" required>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>

                <div class="login-link">
                    Already have an account? <a href="signin.html">Sign In</a>
                </div>


            </form>
        </div>
    </div>

    <script src="js/sign_up.js" type="module"></script>
</body>

</html>
