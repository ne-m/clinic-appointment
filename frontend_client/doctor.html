<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Profile</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/doctor.css">

    <style>
        .time-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .slot {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
        }

        .slot.selected {
            background: #1D9E75;
            color: white;
        }
    </style>
</head>

<body>
    <!-- Nav -->
    <div class="nav-bar">
        <span class="nav-logo"> <a href="index.html">ClinicBook</a></span>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="appointments.html">My appointments</a>
            <a href="profile.html">Profile</a>
        </div>
        <div class="row-flex" style="gap:8px;">
            <div class="av av-blue" style="width:32px;height:32px;font-size:12px;"></div>
            <span style="font-size:13px;font-weight:500;color:var(--text-primary);">User</span>
        </div>
    </div>

    <div class="hero">
        <div class="hero-inner">
            <div class="hero-top">
                <div class="doc-avatar" id="docAvatar" style="background: linear-gradient(135deg,#1D9E75,#185fa5);">
                    <span id="docInitials">US</span>
                    <div class="avail-dot" id="availDot"></div>
                </div>
                <div style="flex:1;min-width:200px;">
                    <div class="doc-name" id="docName">Dr..</div>
                    <div class="doc-spec" id="docSpec">GP</div>
                    <div class="doc-meta">
                    </div>
                    <div style="display:flex;gap:6px;flex-wrap:wrap;">
                        <span class="badge badge-green" id="availBadge">Available today</span>
                        <span class="badge badge-blue" id="langBadge">English · Swahili</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Bio</div>
                <p class="bio-text" id="docBio">
                    bio
                </p>
            </div>

            <div class="booking-container">
                <!-- Date Picker -->
                <div class="calendar-container">
                    <div class="calendar-header">
                        <button id="prevMonth">←</button>
                        <h3 id="monthYear"></h3>
                        <button id="nextMonth">→</button>
                    </div>

                    <div class="calendar-days">
                        <span>S</span>
                        <span>M</span>
                        <span>T</span>
                        <span>W</span>
                        <span>T</span>
                        <span>F</span>
                        <span>S</span>
                    </div>

                    <div class="calendar-grid" id="calendar"></div>
                </div>

                <!-- Time Slots -->
                <div class="field-group slot-container" style="margin-bottom: 20px;">
                    <h3 class="">Available Time Slots</h3>
                    <div id="timeSlots" class="time-slots">
                        <p>Select a date to see the slots</p>
                    </div>
                </div>

                <!-- Reason -->
                <div class="field-group">
                    <label class="field-label">Reason For Visit</label>
                    <textarea id="reason" class="field-input"></textarea>
                </div>

                <div>
                    <div class="message-box" id="message"></div>
                </div>

                <!-- Book Button -->
                <button id="bookBtn" class="btn-primary" style="margin-top: 20px;">Book Appointment</button>

            </div>

        </div>
    </div>



    <script src="js/doctor.js" type="module"></script>
</body>

</html>
