<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <div class="nav-bar">
        <span class="nav-logo">ClinicBook</span>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="appointments.html">My appointments</a>
            <a href="profile.html">Profile</a>
        </div>
        <div class="row-flex" style="gap:8px;">
            <div class="av av-blue" style="width:32px;height:32px;font-size:12px;">US</div>
            <span style="font-size:13px;font-weight:500;color:var(--text-primary);">User</span>
        </div>
    </div>

    <div id="panel-profile" class="dash-panel">

        <!-- Profile hero card -->
        <div class="profile-hero">
            <div class="profile-avatar-wrap">
                <div class="profile-avatar"><span class="initials"></span></div>
                <!-- To be added -->
                <!-- <button class="avatar-edit-btn" title="Change photo">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M11 2l3 3-8 8H3v-3l8-8z" stroke="white" stroke-width="1.4" stroke-linejoin="round" />
                    </svg>
                </button> -->
            </div>
            <div>
                <div class="profile-name">Jane Doe</div>
                <div class="profile-meta">Patient · Member since ....</div>
                <div class="profile-uuid">UUID: </div>
                <!-- <div class="row-flex" style="gap:6px;margin-top:8px;flex-wrap:wrap;">
                    <span class="badge badge-green">Verified account</span>
                    <span class="badge badge-blue">3 upcoming appointments</span>
                </div> -->
            </div>
        </div>


        <div id="ptab-personal" class="ptab-panel active">
            <div class="card">
                <div class="row-flex" style="justify-content:space-between;margin-bottom:16px;">
                    <p class="section-label">Personal details</p>
                    <button class="btn-outline" id="toggle-edit" style="font-size:12px;padding:5px 12px;">Edit</button>
                </div>
                <div id="personal-form" data-editing="false">
                    <div class="field-grid">
                        <div class="field-group">
                            <label class="field-label">First name</label>
                            <input class="field-input" id="first_name" value="First name" readonly />
                        </div>
                        <div class="field-group">
                            <label class="field-label">Last name</label>
                            <input class="field-input" id="last_name" value="Last Name" readonly />
                        </div>
                        <div class="field-group">
                            <label class="field-label">Date of birth</label>
                            <input class="field-input" type="date" id="dob" value="" readonly />
                        </div>
                        <div class="field-group">
                            <label class="field-label">Gender</label>
                            <input class="field-input" id="gender" value="" readonly />
                        </div>
                        <div class="field-group">
                            <label class="field-label">Phone number</label>
                            <input class="field-input" id="phone" value="+254 7220 000 000" readonly />
                        </div>
                        <div class="field-group">
                            <label class="field-label">Email address</label>
                            <input class="field-input" id="email" value="email@gmail.com" readonly />
                        </div>
                        <div class="field-group" style="grid-column:1/-1;">
                            <label class="field-label">Home address</label>
                            <input class="field-input" id="address" value="" readonly />
                        </div>
                        <!-- <div class="field-group">
                            <label class="field-label">National ID / Passport</label>
                            <input class="field-input" value="KE-28374659" readonly />
                        </div> -->
                        <!-- <div class="field-group">
                            <label class="field-label">Nationality</label>
                            <input class="field-input" value="Kenyan" readonly />
                        </div> -->
                    </div>
                    <p id="message"></p>
                    <div id="personal-save-row" style="display:none;margin-top:14px;" class="row-flex" style="gap:8px;">
                        <button class="btn-primary" id="save-edit">Save changes</button>
                        <button class="btn-outline" id="cancel-edit">Cancel</button>
                    </div>
                </div>
            </div>

        </div>


    </div>

    <script src="js/profile.js" type="module"></script>
</body>

</html>
