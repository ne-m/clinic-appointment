<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <div class="nav-bar">
        <span class="nav-logo"> <a href="index.html">ClinicBook</a></span>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="appointments.html">My appointments</a>
            <a href="profile.html">Profile</a>
        </div>
        <div class="row-flex" style="gap:8px;">
            <div class="av av-blue" style="width:32px;height:32px;font-size:12px;"></div>
            <span style="font-size:13px;font-weight:500;color:var(--text-primary);">User</span>
        </div>
    </div>

    <div id="panel-profile" class="dash-panel">

        <!-- Profile hero card -->
        <div class="profile-hero">
            <div class="profile-avatar-wrap">
                <div class="profile-avatar"><span class="initials"></span></div>
                <!-- To be added -->
                <button class="avatar-edit-btn" title="Change photo">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M11 2l3 3-8 8H3v-3l8-8z" stroke="white" stroke-width="1.4" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
            <div>
                <div class="profile-name"></div>
                <div class="profile-meta"></div>
                <div class="profile-uuid"></div>
            </div>
        </div>

        <div class="profile-tabs" id="profileTabs">
            <button class="ptab active" onclick="switchPTab('personal',this)">Personal info</button>
            <button class="ptab" onclick="switchPTab('security',this)">Security</button>
        </div>

        <div id="ptab-personal" class="ptab-panel active">
            <!-- <div class="row-flex" style="margin-bottom: 20px;">
                <div>
                    <div style="font-size:13px;font-weight:500;">Change API</div>
                </div>
                <label class="toggle-label">
                    <input type="checkbox" id="apiToggle" />
                    <span class="toggle-track2"><span class="toggle-thumb"></span></span>
                </label>
            </div> -->

            <div class="card">
                <div class="row-flex" style="justify-content:space-between;margin-bottom:16px;">
                    <p class="section-label">Personal details</p>
                    <button class="btn-outline btn" id="toggle-edit">Edit</button>
                </div>
                <div id="personal-form" data-editing="false">
                    <div class="field-grid">
                        <div class="field-group">
                            <label class="field-label">First name</label>
                            <input class="field-input" id="first_name" value="First name" readonly />
                        </div>
                        <div class="field-group">
                            <label class="field-label">Last name</label>
                            <input class="field-input" id="last_name" value="Last Name" readonly />
                        </div>
                        <div class="field-group">
                            <label class="field-label">Date of birth</label>
                            <input class="field-input" type="date" id="dob" value="" readonly />
                        </div>
                        <div class="field-group">
                            <label class="field-label">Gender</label>
                            <select class="field-input" id="gender" value="" readonly>
                                <option value=""></option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                            <!-- <input class="field-input" id="gender" value="" readonly /> -->
                        </div>
                        <div class="field-group">
                            <label class="field-label">Phone number</label>
                            <input class="field-input" id="phone" value="+254 7220 000 000" readonly />
                        </div>
                        <div class="field-group">
                            <label class="field-label">Email address</label>
                            <input class="field-input" id="email" value="email@gmail.com" readonly />
                        </div>
                        <div class="field-group" style="grid-column:1/-1;">
                            <label class="field-label">Home address</label>
                            <input class="field-input" id="address" value="" readonly />
                        </div>
                    </div>
                    <!-- <p id="message"></p> -->
                    <div>
                        <div class="message-box" id="message"></div>
                    </div>

                    <div id="personal-save-row" style="display:none;margin-top:14px;" class="row-flex" style="gap:8px;">
                        <button class="btn-primary" id="save-edit">Save changes</button>
                        <button class="btn-outline" id="cancel-edit">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── Security ── -->
        <div id="ptab-security" class="ptab-panel">
            <div class="card">
                <p class="section-label" style="margin-bottom:16px;">Password</p>
                <div class="field-group" style="margin-bottom:12px;">
                    <label class="field-label">Current password</label>
                    <input class="field-input" type="password" value="••••••••" readonly />
                </div>
                <div class="field-group" style="margin-bottom:12px;">
                    <label class="field-label">New password</label>
                    <input class="field-input" type="password" placeholder="Enter new password" id="newPwd" />
                </div>
                <div class="field-group" style="margin-bottom:16px;">
                    <label class="field-label">Confirm new password</label>
                    <input class="field-input" type="password" placeholder="Repeat new password" id="confirmNewPwd" />
                </div>
                <div>
                    <div class="message-box" id="passwordMessage"></div>
                </div>
                <button class="btn-primary" id="updatePwd">Update password</button>
            </div>

            <div class="card">
                <button class="btn-outline" id="logout" onclick="openModal()">Logout</button>
            </div>

            <div class="card" style="border-color:#F7C1C1;">
                <p class="section-label" style="margin-bottom:4px;color:#A32D2D;">Danger zone</p>
                <p style="font-size:12px;color:var(--text-secondary);margin-bottom:14px;">Permanently delete your
                    account
                    and
                    all data. This cannot be undone.</p>
                <button class="btn-outline btn-red" id="deleteAcc">Delete Account</button>
            </div>
        </div>

    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-icon" id="modalIcon" style="background-color: rgba(220,38,38,.12);"><svg width="13"
                    height="13" viewBox="0 0 16 16" fill="none">
                    <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg></div>
            <div class="modal-title" id="modalTitle">Log out?</div>
            <div class="modal-sub" id="modalSub">Hope to see you soon. Continue to logout?</div>
            <div class="modal-btns">
                <button class="action-btn btn-outline" onclick="closeModal()">Cancel</button>
                <button class="action-btn btn-red" id="modalConfirm">Confirm</button>
            </div>
        </div>
    </div>

    <script src="js/profile.js" type="module"></script>
</body>

</html>
